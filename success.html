<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>David Ames | Mensaje Enviado</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body { 
            background-color: #0a0a0a; 
            color: #fff; 
            font-family: 'Poppins', sans-serif; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            margin: 0; 
            text-align: center; 
            padding: 2rem;
            background-image: radial-gradient(circle at 50% 30%, rgba(16, 205, 25, 0.08) 0%, transparent 50%);
        }
        .container { max-width: 600px; }
        h1 { color: #fff; font-size: clamp(2rem, 5vw, 3rem); margin-bottom: 1rem; line-height: 1.2; letter-spacing: -0.03em; }
        h1 span { color: #10cd19; }
        p { color: #a0a0a0; margin-bottom: 2.5rem; font-size: 1.1rem; line-height: 1.6; }
        .btn { 
            display: inline-block; 
            background-color: #10cd19; 
            color: #000; 
            padding: 1rem 2rem; 
            border-radius: 50px; 
            text-decoration: none; 
            font-weight: 600; 
            transition: all 0.3s;
            box-shadow: 0 4px 20px rgba(16, 205, 25, 0.3);
        }
        .btn:hover { 
            background-color: #0b9e12; 
            transform: translateY(-3px); 
            box-shadow: 0 6px 25px rgba(16, 205, 25, 0.4);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>¡Mensaje <span>Enviado!</span></h1>
        <p>Gracias por escribirme. He recibido tus datos correctamente y me pondré en contacto contigo muy pronto para empezar a construir tu nuevo camino.</p>
        <a href="/" class="btn">Volver a la página principal</a>
    </div>
</body>
</html>
